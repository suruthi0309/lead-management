<!DOCTYPE html>
<html>

<head>

<title>Lead Form</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="container">

<form class="form">

<h2>FORM PAGE</h2>


<div class="inputBox">

<input id="name" required placeholder=" ">

<label>Name *</label>

</div>


<div class="inputBox">

<input id="mobile" required placeholder=" ">

<label>Mobile *</label>

</div>


<div class="inputBox">

<input id="email" placeholder=" ">

<label>Email</label>

</div>


<select id="service">

<option>WhatsApp Automation</option>

<option>CRM Development</option>

<option>Software Development</option>

</select>


<textarea id="message"
placeholder="Your Message"></textarea>


<button
type="button"
onclick="submitLead()">

Submit Enquiry

</button>

</form>

</div>

<script src="/static/script.js"></script>

</body>

</html>
